<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reported Speech Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500" rel="stylesheet">
<style>
  :root {
    --bg:#f8f6ff;
    --surface:#f1eeff;
    --card:#ffffff;
    --border:#e0d9f7;
    --accent1: #7c3aed;
    --accent2: #ec4899;
    --accent3: #22c55e;
    --green:#16a34a;
    --red:#dc2626;
    --text:#1a1433;
    --muted:#6b7280;
  
  --ink:#1a1433;--ink2:#5a4e80;
}

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background:var(--bg);
    color: var(--ink);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
  justify-content: center;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(192,132,252,0.12) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
   max-width: 680px;
  width: 100%;
  padding: 20px 16px 120px;
  }

  /* HEADER */
  header {
  text-align: left;
  margin-bottom: 24px;
}

h1 {
  font-size: 1.8rem;
}

.subtitle {
  font-size: 13px;
}

  .badge {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent3);
    border: 1px solid var(--accent3);
    padding: 4px 12px;
    margin-bottom: 16px;
  }

  h1 {
    font-size: clamp(2rem, 6vw, 3.4rem);
    font-weight: 800;
    line-height: 1.05;
    margin-bottom: 8px;
  }

  h1 em { font-style: normal; color: var(--accent1); }
  .subtitle { color:var(--muted); font-size: 15px; }

  /* TABS */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px;
    margin-bottom: 36px;
    animation: fadeDown 0.6s 0.1s ease both;
  }

  .tab {
    flex: 1;
    min-width: 100px;
    padding: 10px 8px;
    border: none;
    background: transparent;
    color:var(--muted);
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .tab.active {
    background: var(--card);
    color: var(--accent1);
    border: 1px solid var(--accent1);
  }

  .tab[data-type="statements"].active { color: var(--accent1); border-color: var(--accent1); }
  .tab[data-type="questions"].active { color: var(--accent2); border-color: var(--accent2); }
  .tab[data-type="commands"].active { color: var(--accent3); border-color: var(--accent3); }
  .tab[data-type="tense"].active { color: var(--green); border-color: var(--green); }
  .tab[data-type="mixed"].active { color: #60a5fa; border-color: #60a5fa; }

  /* TENSE SHIFT TABLE */
  .tense-table {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 32px;
    animation: fadeUp 0.4s ease both;
  }

  .tense-table-header {
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--card);
    border-bottom: 1px solid var(--border);
  }

  .tense-table-header span {
    padding: 10px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color:var(--muted);
    text-transform: uppercase;
  }

  .tense-table-header span:first-child { border-right: 1px solid var(--border); }

  .tense-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  .tense-row:last-child { border-bottom: none; }
  .tense-row:hover { background: rgba(192,132,252,0.04); }

  .tense-cell {
    padding: 10px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    line-height: 1.5;
  }

  .tense-cell:first-child {
    border-right: 1px solid var(--border);
    color: var(--accent2);
  }

  .tense-cell:last-child { color: var(--accent1); }

  .tense-arrow { color:var(--muted); margin: 0 4px; }

  /* THEORY CARD */
  .theory-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 22px 24px;
    margin-bottom: 28px;
    animation: fadeUp 0.4s ease both;
    border-left: 3px solid var(--accent1);
  }

  .theory-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent1);
    margin-bottom: 10px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 1px;
  }

  .theory-rule {
    font-size: 13px;
    color: var(--ink);
    line-height: 1.7;
    margin-bottom: 6px;
  }

  .theory-rule strong { color: var(--accent1); }

  .example-pair {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
  }

  @media (max-width: 500px) { .example-pair { grid-template-columns: 1fr; } }

  .ex-box {
    background: var(--card);
    border-radius: 2px;
    padding: 10px 12px;
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    line-height: 1.5;
  }

  .ex-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    margin-bottom: 4px;
    text-transform: uppercase;
  }

  .ex-label.direct { color: var(--accent2); }
  .ex-label.reported { color: var(--accent1); }

  /* PROGRESS */
  .progress-wrap {
    margin-bottom: 28px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color:var(--muted);
    margin-bottom: 8px;
  }

  .progress-bar-bg {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    height: 8px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent1), var(--accent2));
    border-radius: 10px;
    transition: width 0.4s ease;
  }

  /* QUESTION CARD */
 .question-card {
  background: #ffffff;
  border: 1px solid #e5e7eb;
  border-radius: 14px;
  padding: 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

  .question-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent1), var(--accent2));
  }

  .q-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .q-tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    padding: 3px 8px;
    border: 1px solid;
    text-transform: uppercase;
    border-radius: 1px;
  }

  .tag-statements { color: var(--accent1); border-color: var(--accent1); }
  .tag-questions  { color: var(--accent2); border-color: var(--accent2); }
  .tag-commands   { color: var(--accent3); border-color: var(--accent3); }
  .tag-tense      { color: var(--green);   border-color: var(--green); }

  .direct-speech {
    background: var(--card);
    border-left: 3px solid var(--accent2);
    padding: 14px 16px;
    margin-bottom: 20px;
    border-radius: 0 2px 2px 0;
    font-style: italic;
    font-size: 1rem;
    color: var(--ink);
    line-height: 1.6;
  }

  .direct-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    letter-spacing: 1.5px;
    margin-bottom: 6px;
    font-style: normal;
  }

 .question-text {
  font-size: 1.25rem;
  font-weight: 700;
}

.direct-speech {
  font-size: 1.1rem;
}

  .blank {
    display: inline-block;
    min-width: 150px;
    border-bottom: 2px solid var(--accent1);
    color: var(--accent1);
    font-family: 'Space Mono', monospace;
    padding: 0 4px;
    text-align: center;
  }

  /* INPUT */
  .answer-input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 10px;
  }

  .answer-input:focus { border-color: var(--accent1); }
  .answer-input.correct { border-color: var(--green); background: rgba(22,163,74,0.05); }
  .answer-input.incorrect { border-color: var(--red); background: rgba(220,38,38,0.05); }

  .hint-text {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color:var(--muted);
    margin-bottom: 16px;
  }

  /* OPTIONS */
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }

  @media (max-width: 500px) { .options-grid { grid-template-columns: 1fr; } }

  .option-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 14px;
    color: var(--ink);
    font-family: 'Space Mono', monospace;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s ease;
    line-height: 1.5;
  }
  .btn:active {
  transform: scale(0.96);
}
  .option-btn:hover:not(:disabled) { border-color: var(--accent1); color: var(--accent1);transform: scale(1.02) }
  .option-btn.correct { border-color: var(--green); color: var(--green); background: rgba(22,163,74,0.07); }
  .option-btn.incorrect { border-color: var(--red); color: var(--red); background: rgba(220,38,38,0.07); }
  .option-btn:disabled { cursor: default; }


  /* FEEDBACK */
  .feedback {
    padding: 13px 16px;
    border-radius: 2px;
    font-size: 13px;
    margin-top: 12px;
    display: none;
    animation: fadeUp 0.2s ease both;
    line-height: 1.7;
  }

  .feedback.correct { background: rgba(22,163,74,0.07); border: 1px solid var(--green); color: var(--green); }
  .feedback.incorrect { background: rgba(220,38,38,0.07); border: 1px solid var(--red); color: var(--red); }
  .feedback .correct-answer { font-family: 'Space Mono', monospace; font-weight: 700; margin-top: 4px; display: block; color: var(--accent1); }
  .feedback .explanation { margin-top: 6px; display: block; color:var(--muted); font-size: 12px; }

  /* BUTTONS */
  .btn-row { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }

  .btn {
    padding: 11px 22px;
    border: 1px solid;
    background: transparent;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }

  .btn-primary { border-color: var(--accent1); color: var(--accent1); }
  .btn-primary:hover { background: var(--accent1); color: var(--bg); }
  .btn-secondary { border-color: var(--border); color:var(--muted); }
  .btn-secondary:hover { border-color: var(--ink); color: var(--ink); }
  .btn-next {
  width: 100%;
  padding: 16px;
  font-size: 15px;
  border-radius: 12px;
  font-weight: 700;
}
  .btn-next:hover { background: var(--green); color: var(--bg); }

  /* SCORE */
  .score-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 48px 32px;
    text-align: center;
    animation: fadeUp 0.5s ease both;
  }

  .score-emoji { font-size: 60px; margin-bottom: 8px; }
  .score-big { font-size: 72px; font-weight: 800; line-height: 1; margin-bottom: 6px; }
  .score-label { font-family: 'Space Mono', monospace; font-size: 12px; color:var(--muted); letter-spacing: 2px; margin-bottom: 32px; }

  .score-details { display: flex; justify-content: center; gap: 40px; margin-bottom: 40px; flex-wrap: wrap; }
  .score-stat { text-align: center; }
  .score-stat-num { font-size: 28px; font-weight: 800; }
  .score-stat-label { font-size: 14px; color:var(--muted); font-family: 'Space Mono', monospace; letter-spacing: 1px; }

  .score-message {
    font-size: 14px;
    color:var(--muted);
    max-width: 360px;
    margin: 0 auto 32px;
    line-height: 1.7;
  }

  /* ANIMATIONS */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="container">

  <header>
     <div style="text-align:center;margin-bottom:18px">
     <div class="badge">🎭 English Practice</div>
    <h1>REPORTED<br><em>SPEECH</em></h1>
    <p class="subtitle">Statements · Questions · Commands · Tense Shift</p>
  </header>

  <div class="tabs" id="tabs">
    <button class="tab active" data-type="statements" onclick="selectType('statements',this)">📢 Statements</button>
    <button class="tab" data-type="questions" onclick="selectType('questions',this)">❓ Questions</button>
    <button class="tab" data-type="commands" onclick="selectType('commands',this)">⚡ Commands</button>
    <button class="tab" data-type="tense" onclick="selectType('tense',this)">🔄 Tense Shift</button>
    <button class="tab" data-type="mixed" onclick="selectType('mixed',this)">🎲 Mixed</button>
  </div>

  <div id="app"></div>

</div>

<script>
const THEORY = {
  statements: {
    title: 'REPORTED STATEMENTS',
    rules: [
      'Say → <strong>said / told + person</strong>',
      'Tenses shift back one step in time',
      'Pronouns and time expressions change',
    ],
    direct: '"I am working on a new chatbot." (Sarah)',
    reported: 'Sarah said (that) she was working on a new chatbot.',
    borderColor: 'var(--accent1)',
    tagClass: 'tag-statements'
  },
  questions: {
    title: 'REPORTED QUESTIONS',
    rules: [
      'Yes/No questions → <strong>asked if / whether</strong>',
      'Wh- questions → <strong>asked + wh-word + subject + verb</strong>',
      'No question mark, no auxiliary inversion',
    ],
    direct: '"Do you have experience?" / "Where do you work?"',
    reported: 'He asked if I had experience. / She asked where I worked.',
    borderColor: 'var(--accent2)',
    tagClass: 'tag-questions'
  },
  commands: {
    title: 'REPORTED COMMANDS & REQUESTS',
    rules: [
      'Tell/Ask + object + <strong>to + infinitive</strong>',
      'Negative → <strong>not to + infinitive</strong>',
      'No tense shift needed — infinitive is neutral',
    ],
    direct: '"Please send the report." / "Don\'t be late."',
    reported: 'She asked me to send the report. / He told me not to be late.',
    borderColor: 'var(--accent3)',
    tagClass: 'tag-commands'
  },
  tense: {
    title: 'TENSE BACKSHIFT TABLE',
    rules: [
      'Present Simple → <strong>Past Simple</strong>',
      'Present Continuous → <strong>Past Continuous</strong>',
      'Will → <strong>Would</strong>',
      'Past Simple → <strong>Past Perfect</strong>',
      'Can → <strong>Could</strong>  |  Must → <strong>Had to</strong>',
    ],
    direct: '"We will deliver the product next week."',
    reported: 'They said they would deliver the product the following week.',
    borderColor: 'var(--green)',
    tagClass: 'tag-tense'
  },
  mixed: {
    title: 'MIXED — All Types',
    rules: ['Aplica todas las reglas según el tipo de oración.'],
    direct: '"I can help you with that project." (Marco)',
    reported: 'Marco said he could help me with that project.',
    borderColor: '#60a5fa',
    tagClass: 'tag-statements'
  }
};

const TENSE_SHIFTS = [
  ['Present Simple', 'Past Simple'],
  ['Present Continuous', 'Past Continuous'],
  ['Present Perfect', 'Past Perfect'],
  ['Past Simple', 'Past Perfect'],
  ['Future (will)', 'Would'],
  ['Can', 'Could'],
  ['May', 'Might'],
  ['Must / Have to', 'Had to'],
];

const QUESTIONS = [
  // STATEMENTS
  { type: 'statements', mode: 'mc',
    direct: '"I work at a tech startup in San José."',
    speaker: 'Carlos',
    stem: 'Carlos said that he __ at a tech startup in San José.',
    options: ['worked', 'works', 'had worked', 'is working'],
    answer: 'worked',
    explain: 'Present Simple → Past Simple in reported speech.' },

  { type: 'statements', mode: 'fill',
    direct: '"We are launching the app next month."',
    speaker: 'The team',
    stem: 'The team said they __ (launch) the app the following month.',
    answer: 'were launching',
    hint: 'Present Continuous → Past Continuous',
    explain: 'am/is/are + -ing → was/were + -ing' },

  { type: 'statements', mode: 'mc',
    direct: '"I will send you the contract tomorrow."',
    speaker: 'The client',
    stem: 'The client said she __ the contract the next day.',
    options: ['would send', 'will send', 'sent', 'had sent'],
    answer: 'would send',
    explain: 'Will → Would in reported speech.' },

  { type: 'statements', mode: 'fill',
    direct: '"I have already reviewed the proposal."',
    speaker: 'Ana',
    stem: 'Ana said she __ (already / review) the proposal.',
    answer: 'had already reviewed',
    hint: 'Present Perfect → Past Perfect',
    explain: 'have/has + past participle → had + past participle' },

  { type: 'statements', mode: 'mc',
    direct: '"I can\'t attend the meeting today."',
    speaker: 'Miguel',
    stem: 'Miguel said he __ attend the meeting that day.',
    options: ["couldn't", "can't", "won't", "didn't"],
    answer: "couldn't",
    explain: 'Can → Could in reported speech.' },

  { type: 'statements', mode: 'fill',
    direct: '"Our chatbot handles over 200 conversations per day."',
    speaker: 'The CEO',
    stem: 'The CEO said their chatbot __ (handle) over 200 conversations per day.',
    answer: 'handled',
    hint: 'Present Simple → Past Simple',
    explain: 'Simple present verbs shift to past simple.' },

  // QUESTIONS
  { type: 'questions', mode: 'mc',
    direct: '"Do you have experience with WhatsApp Business API?"',
    speaker: 'The interviewer',
    stem: 'The interviewer asked me if I __ experience with WhatsApp Business API.',
    options: ['had', 'have', 'did have', 'was having'],
    answer: 'had',
    explain: 'Yes/No question with "do" → asked if + Past Simple.' },

  { type: 'questions', mode: 'fill',
    direct: '"Where does your company operate?"',
    speaker: 'The investor',
    stem: 'The investor asked where our company __ (operate).',
    answer: 'operated',
    hint: 'Wh- question: asked + where + subject + verb (Past Simple)',
    explain: 'No inversion: asked where + subject + verb.' },

  { type: 'questions', mode: 'mc',
    direct: '"Will the platform be ready by Friday?"',
    speaker: 'The client',
    stem: 'The client asked whether the platform __ ready by Friday.',
    options: ['would be', 'will be', 'was', 'had been'],
    answer: 'would be',
    explain: 'Will → Would; whether for yes/no questions.' },

  { type: 'questions', mode: 'fill',
    direct: '"How many users have signed up?"',
    speaker: 'The manager',
    stem: 'The manager asked how many users __ (sign) up.',
    answer: 'had signed',
    hint: 'Present Perfect → Past Perfect',
    explain: 'Wh- question + have/has → had in reported speech.' },

  { type: 'questions', mode: 'mc',
    direct: '"Can you explain the pricing model?"',
    speaker: 'The prospect',
    stem: 'The prospect asked if I __ explain the pricing model.',
    options: ['could', 'can', 'would', 'should'],
    answer: 'could',
    explain: 'Can → Could in reported questions.' },

  // COMMANDS
  { type: 'commands', mode: 'mc',
    direct: '"Please send me the invoice by Monday."',
    speaker: 'The client',
    stem: 'The client asked me __ the invoice by Monday.',
    options: ['to send', 'send', 'sending', 'that I send'],
    answer: 'to send',
    explain: 'Requests: asked + object + to + infinitive.' },

  { type: 'commands', mode: 'fill',
    direct: '"Don\'t share the access credentials with anyone."',
    speaker: 'The manager',
    stem: 'The manager told us __ (not / share) the access credentials with anyone.',
    answer: 'not to share',
    hint: 'Negative command: told + object + not to + infinitive',
    explain: 'Negative commands use "not to + infinitive".' },

  { type: 'commands', mode: 'mc',
    direct: '"Close the deal before the end of the month."',
    speaker: 'The supervisor',
    stem: 'The supervisor told the sales team __ the deal before the end of the month.',
    options: ['to close', 'close', 'closed', 'closing'],
    answer: 'to close',
    explain: 'Commands: told + object + to + infinitive.' },

  { type: 'commands', mode: 'fill',
    direct: '"Please don\'t call after 8 PM."',
    speaker: 'The partner',
    stem: 'The partner asked us __ (not / call) after 8 PM.',
    answer: 'not to call',
    hint: 'Negative request: asked + object + not to + infinitive',
    explain: 'Both "told" and "asked" work with not to + infinitive.' },

  // TENSE SHIFT FOCUS
  { type: 'tense', mode: 'mc',
    direct: '"I must finish the report today."',
    speaker: 'She',
    stem: 'She said she __ finish the report that day.',
    options: ['had to', 'must', 'should', 'needed'],
    answer: 'had to',
    explain: 'Must → Had to in reported speech.' },

  { type: 'tense', mode: 'fill',
    direct: '"We may consider your proposal."',
    speaker: 'They',
    stem: 'They said they __ (may) consider our proposal.',
    answer: 'might',
    hint: 'May → Might',
    explain: 'Modal "may" shifts to "might" in reported speech.' },

  { type: 'tense', mode: 'mc',
    direct: '"I was reviewing the data all morning."',
    speaker: 'He',
    stem: 'He said he __ the data all morning.',
    options: ['had been reviewing', 'was reviewing', 'reviewed', 'is reviewing'],
    answer: 'had been reviewing',
    explain: 'Past Continuous → Past Perfect Continuous.' },

  { type: 'tense', mode: 'fill',
    direct: '"The system crashed yesterday."',
    speaker: 'The technician',
    stem: 'The technician said the system __ (crash) the day before.',
    answer: 'had crashed',
    hint: 'Past Simple → Past Perfect',
    explain: '"Yesterday" → "the day before" in reported speech.' },

  { type: 'tense', mode: 'mc',
    direct: '"I\'ve been working on this feature for two weeks."',
    speaker: 'The developer',
    stem: 'The developer said she __ on that feature for two weeks.',
    options: ['had been working', 'has been working', 'was working', 'worked'],
    answer: 'had been working',
    explain: 'Present Perfect Continuous → Past Perfect Continuous.' },
];

let currentType = 'statements';
let currentQ = 0;
let score = 0;
let answered = false;
let questions = [];

function selectType(type, btn) {
  currentType = type;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  startSession();
}

function getQuestions(type) {
  const pool = type === 'mixed' ? [...QUESTIONS] : QUESTIONS.filter(q => q.type === type);
  return shuffle([...pool]);
}

function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

function startSession() {
  questions = getQuestions(currentType);
  currentQ = 0; score = 0; answered = false;
  renderQuestion();
}

function renderTheoryCard() {
  const type = currentType === 'mixed' ? 'mixed' : currentType;
  const t = THEORY[type];

  let tenseTable = '';
  if (type === 'tense' || type === 'mixed') {
    tenseTable = `
      <div class="tense-table" style="margin-top:16px">
        <div class="tense-table-header">
          <span>DIRECT SPEECH</span>
          <span>REPORTED SPEECH</span>
        </div>
        ${TENSE_SHIFTS.map(([d,r]) => `
          <div class="tense-row">
            <div class="tense-cell">${d}</div>
            <div class="tense-cell">${r}</div>
          </div>`).join('')}
      </div>`;
  }

  return `
    <div class="theory-card" style="border-left-color:${t.borderColor}">
      <div class="theory-title">${t.title}</div>
      ${t.rules.map(r => `<p class="theory-rule">▸ ${r}</p>`).join('')}
      <div class="example-pair">
        <div class="ex-box">
          <div class="ex-label direct">DIRECT</div>
          ${t.direct}
        </div>
        <div class="ex-box">
          <div class="ex-label reported">REPORTED</div>
          ${t.reported}
        </div>
      </div>
      ${tenseTable}
    </div>`;
}

function renderQuestion() {
  const app = document.getElementById('app');
  if (currentQ >= questions.length) { renderScore(); return; }

  const q = questions[currentQ];
  const total = questions.length;
  const pct = Math.round((currentQ / total) * 100);
  const tagClass = THEORY[q.type]?.tagClass || 'tag-statements';
  const typeLabel = q.type === 'statements' ? 'Statement' : q.type === 'questions' ? 'Question' : q.type === 'commands' ? 'Command' : 'Tense Shift';

  let inputHtml = '';
  if (q.mode === 'fill') {
    inputHtml = `
      <input class="answer-input" id="answerInput" placeholder="Type the reported form..." autocomplete="off"
        onkeydown="if(event.key==='Enter' && !${answered})checkFill()">
      <p class="hint-text">💡 ${q.hint}</p>`;
  } else {
    const opts = shuffle([...q.options]);
    inputHtml = `<div class="options-grid">${opts.map(o =>
      `<button class="option-btn" onclick="checkMC(this,'${o.replace(/'/g,"\\'")}','${q.answer.replace(/'/g,"\\'")}')">
        ${o}
      </button>`).join('')}</div>`;
  }

  app.innerHTML = `
    ${renderTheoryCard()}
    <div class="progress-wrap">
      <div class="progress-label">
        <span>Question ${currentQ + 1} / ${total}</span>
        <span>Score: ${score} / ${currentQ}</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar" style="width:${pct}%"></div>
      </div>
    </div>

    <div class="question-card">
      <div class="q-meta">
        <span class="q-tag ${tagClass}">${typeLabel}</span>
        <span class="q-tag" style="color:var(--muted);border-color:var(--border)">
          ${q.mode === 'fill' ? '✏️ Fill in' : '☑️ Multiple Choice'}
        </span>
      </div>

      <div class="direct-speech">
        <div class="direct-label">Direct Speech</div>
        ${q.direct}
        <span style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);font-style:normal;"> — ${q.speaker}</span>
      </div>

      <p class="question-text">${q.stem.replace('__', '<span class="blank">___</span>')}</p>

      ${inputHtml}
      <div class="feedback" id="feedback"></div>

      <div class="btn-row" id="btnRow">
        ${q.mode === 'fill' ? `<button class="btn btn-primary" onclick="checkFill()">Check ✓</button>` : ''}
        <button class="btn btn-secondary" onclick="skipQ()">Skip →</button>
      </div>
    </div>`;

  answered = false;
  if (q.mode === 'fill') setTimeout(() => { const i = document.getElementById('answerInput'); if(i) i.focus(); }, 80);
}

function checkFill() {
  if (answered) return;
  const input = document.getElementById('answerInput');
  const q = questions[currentQ];
  const user = input.value.trim().toLowerCase();
  const correct = q.answer.toLowerCase();
  const ok = user === correct;
  answered = true;
  input.classList.add(ok ? 'correct' : 'incorrect');
  showFeedback(ok, q.answer, q.explain);
  if (ok) score++;
  showNextBtn();
}

function checkMC(btn, chosen, correct) {
  if (answered) return;
  answered = true;
  const ok = chosen === correct;
  btn.classList.add(ok ? 'correct' : 'incorrect');
  if (!ok) {
    document.querySelectorAll('.option-btn').forEach(b => {
      if (b.textContent.trim() === correct) b.classList.add('correct');
    });
  }
  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
  const q = questions[currentQ];
  showFeedback(ok, correct, q.explain);
  if (ok) score++;
  showNextBtn();
}

function showFeedback(ok, correctAns, explain) {
  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  if (ok) {
    fb.className = 'feedback correct';
    fb.innerHTML = `✅ Correct!<span class="explanation">${explain}</span>`;
  } else {
    fb.className = 'feedback incorrect';
    fb.innerHTML = `❌ Not quite.<span class="correct-answer">✓ ${correctAns}</span><span class="explanation">${explain}</span>`;
  }
}

function showNextBtn() {
  document.getElementById('btnRow').innerHTML =
    `<button class="btn btn-next" onclick="nextQ()">Next →</button>`;
}

function skipQ() {
  answered = true;
  const q = questions[currentQ];
  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  fb.className = 'feedback incorrect';
  fb.innerHTML = `Skipped.<span class="correct-answer">✓ ${q.answer}</span><span class="explanation">${q.explain}</span>`;
  showNextBtn();
}

function nextQ() { currentQ++; answered = false; renderQuestion(); }

function renderScore() {
  const app = document.getElementById('app');
  const total = questions.length;
  const pct = Math.round((score / total) * 100);
  const emoji = pct >= 80 ? '🎭' : pct >= 60 ? '💪' : '📖';
  const color = pct >= 80 ? 'var(--green)' : pct >= 60 ? 'var(--accent1)' : 'var(--red)';
  const msg = pct >= 80 ? 'Excellent! You\'ve mastered Reported Speech.'
            : pct >= 60 ? 'Good job! Review the tense shifts to go further.'
            : 'Keep practicing — the rules will click with repetition.';

  app.innerHTML = `
    <div class="score-card">
      <div class="score-emoji">${emoji}</div>
      <div class="score-big" style="color:${color}">${pct}%</div>
      <div class="score-label">FINAL SCORE</div>
      <div class="score-details">
        <div class="score-stat">
          <div class="score-stat-num" style="color:var(--green)">${score}</div>
          <div class="score-stat-label">CORRECT</div>
        </div>
        <div class="score-stat">
          <div class="score-stat-num" style="color:var(--red)">${total - score}</div>
          <div class="score-stat-label">WRONG</div>
        </div>
        <div class="score-stat">
          <div class="score-stat-num">${total}</div>
          <div class="score-stat-label">TOTAL</div>
        </div>
      </div>
      <p class="score-message">${msg}</p>
      <div class="btn-row" style="justify-content:center;gap:12px">
        <button class="btn btn-next" onclick="startSession()">Try Again ↺</button>
        <button class="btn btn-secondary" onclick="selectType('mixed', document.querySelector('[data-type=mixed]'))">Mixed Mode 🎲</button>
      </div>
    </div>`;
}

startSession();
</script>
</body>
</html>
